org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
android.useAndroidX=true
# The current Flutter Gradle plugin still expects AGP's legacy Android extension.
android.newDsl=false
# Flutter SDK packages such as integration_test still apply the Kotlin Android plugin.
# Keep this compatibility flag until the toolchain fully migrates to AGP built-in Kotlin.
android.builtInKotlin=false
